name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@1104c2851e0badfb7187cf71fabc216415bbd420 # Build-Tools main
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleUNADeviceManager
      dist_subfolder: "Simple UNA Device Manager"
      python_version: "3.14"
      build_command: "Build_Simple_UNA_Device_Manager.bat"
      app_id: "e963167d-ad13-4d84-9656-6978ac30ffdd"   # stable installer GUID; generated once, never change
