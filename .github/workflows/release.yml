name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@368e641e28009262f686b74f444a2a0b8600fabd # Build-Tools main (checkout v7)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleUNADeviceManager
      dist_subfolder: "Simple UNA Device Manager"
      python_version: "3.14"
      build_command: "Build_Simple_UNA_Device_Manager.bat"
      app_id: "e963167d-ad13-4d84-9656-6978ac30ffdd"   # stable installer GUID; generated once, never change
