name: Release
on:
  push:
    tags: ['v*']
jobs:
  release:
    uses: JDE-Projects/Build-Tools/.github/workflows/release.yml@1d180ec47b21c46e87303d663099111ce4a36d83 # Build-Tools main (CI checks: ruff, import, pytest)
    permissions:
      id-token: write
      attestations: write
      contents: write
    with:
      app_name: SimpleUNADeviceManager
      dist_subfolder: "Simple UNA Device Manager"
      python_version: "3.14"
      build_command: "Build_Simple_UNA_Device_Manager.bat"
      app_id: "e963167d-ad13-4d84-9656-6978ac30ffdd"   # stable installer GUID; generated once, never change
      entry_script: "simple_una_device_manager.py"
